name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "P.A.T.H/**"
      - "capacitor.config.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/build-android.sh"
      - ".github/workflows/android-build.yml"

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ICON_SOURCE: icons/IMG_0219.png
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci || npm install

      - name: Prepare Android project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Generate Android app icons
        run: |
          python -m pip install --upgrade pip pillow
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageOps

          src = Path("${{ env.ICON_SOURCE }}")
          if not src.exists():
              raise SystemExit(f"ICON_SOURCE not found: {src}")

          base = Image.open(src).convert("RGBA")
          # Keep center-crop behavior so non-square images still produce full launcher icons.
          base = ImageOps.fit(base, (1024, 1024), method=Image.Resampling.LANCZOS, centering=(0.5, 0.5))

          targets = {
              "mdpi": 48,
              "hdpi": 72,
              "xhdpi": 96,
              "xxhdpi": 144,
              "xxxhdpi": 192,
          }

          for density, size in targets.items():
              out_dir = Path(f"android/app/src/main/res/mipmap-{density}")
              out_dir.mkdir(parents=True, exist_ok=True)
              icon = base.resize((size, size), Image.Resampling.LANCZOS)
              icon.save(out_dir / "ic_launcher.png")
              icon.save(out_dir / "ic_launcher_round.png")
              icon.save(out_dir / "ic_launcher_foreground.png")

          print("Generated launcher icons from", src)
          PY

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android assembleDebug

      - name: Validate release signing secrets
        run: |
          missing=()
          [ -z "$ANDROID_KEYSTORE_BASE64" ] && missing+=("ANDROID_KEYSTORE_BASE64")
          [ -z "$ANDROID_KEYSTORE_PASSWORD" ] && missing+=("ANDROID_KEYSTORE_PASSWORD")
          [ -z "$ANDROID_KEY_ALIAS" ] && missing+=("ANDROID_KEY_ALIAS")
          [ -z "$ANDROID_KEY_PASSWORD" ] && missing+=("ANDROID_KEY_PASSWORD")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required repository secrets: ${missing[*]}"
            exit 1
          fi

      - name: Restore Android upload keystore
        run: |
          keystore_path="$RUNNER_TEMP/upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build release AAB
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android bundleRelease \
            -Pandroid.injected.signing.store.file="$ANDROID_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
