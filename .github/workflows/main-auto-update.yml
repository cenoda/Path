name: Main Auto Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-auto-update
  cancel-in-progress: false

jobs:
  deploy-and-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Purge Cloudflare cache
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ZONE_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Write run summary
        run: |
          echo "## Main Auto Update" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "- Render deploy hook: triggered" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Render deploy hook: skipped (set \\`RENDER_DEPLOY_HOOK_URL\\`)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ]; then
            echo "- Cloudflare cache purge: completed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Cloudflare cache purge: skipped (set \\`CLOUDFLARE_API_TOKEN\\` and \\`CLOUDFLARE_ZONE_ID\\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
