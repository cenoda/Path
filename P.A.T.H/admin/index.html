<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.A.T.H 관리자 대시보드</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #141a29;
            --surface-2: #1b2336;
            --line: rgba(255, 255, 255, 0.1);
            --line-strong: rgba(255, 255, 255, 0.2);
            --text: #eef2ff;
            --muted: #98a2c7;
            --primary: #e3b341;
            --primary-bg: rgba(227, 179, 65, 0.12);
            --danger: #f16363;
            --danger-bg: rgba(241, 99, 99, 0.12);
            --success: #55d187;
            --success-bg: rgba(85, 209, 135, 0.14);
            --pending: #ffcd58;
            --pending-bg: rgba(255, 205, 88, 0.14);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 8%, rgba(227, 179, 65, 0.13), transparent 30%),
                radial-gradient(circle at 88% 4%, rgba(73, 156, 255, 0.16), transparent 27%),
                var(--bg);
            color: var(--text);
            font-family: "Noto Sans KR", "Pretendard", sans-serif;
            padding: 20px;
        }

        .wrap {
            max-width: 1220px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(120deg, rgba(227, 179, 65, 0.08), rgba(73, 156, 255, 0.08));
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .title {
            font-size: 18px;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .sub {
            margin-top: 4px;
            font-size: 12px;
            color: var(--muted);
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--line-strong);
            background: var(--surface);
            color: var(--text);
            border-radius: 9px;
            font-size: 12px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn.primary {
            border-color: var(--primary);
            background: var(--primary-bg);
            color: var(--primary);
        }

        .btn.danger {
            border-color: var(--danger);
            background: var(--danger-bg);
            color: var(--danger);
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .auto-refresh {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
            user-select: none;
        }

        .notice {
            display: none;
            margin: 12px 0;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid var(--line);
            background: var(--surface);
        }

        .notice.error {
            display: block;
            border-color: var(--danger);
            background: var(--danger-bg);
            color: #ffd0d0;
        }

        .notice.ok {
            display: block;
            border-color: var(--success);
            background: var(--success-bg);
            color: #d6ffe7;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(5, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 12px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .tab-btn {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--muted);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 12px;
            cursor: pointer;
        }

        .tab-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-bg);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .filter-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 10px;
        }

        .field {
            width: 100%;
            padding: 9px 10px;
            border-radius: 9px;
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            border: 1px solid var(--line);
            background: var(--surface);
            border-radius: 11px;
            padding: 14px;
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .name {
            font-size: 14px;
            font-weight: 700;
        }

        .meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.7;
        }

        .meta strong {
            color: #d9e0ff;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.01em;
            border: 1px solid transparent;
        }

        .badge.pending { color: var(--pending); background: var(--pending-bg); border-color: rgba(255, 205, 88, 0.32); }
        .badge.approved { color: var(--success); background: var(--success-bg); border-color: rgba(85, 209, 135, 0.3); }
        .badge.rejected { color: var(--danger); background: var(--danger-bg); border-color: rgba(241, 99, 99, 0.35); }
        .badge.none { color: #9ca6cc; background: rgba(255, 255, 255, 0.05); border-color: var(--line); }

        .review-block {
            margin-top: 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 11px;
            background: var(--surface-2);
        }

        .review-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .proof {
            display: block;
            width: min(320px, 100%);
            border: 1px solid var(--line);
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
        }

        .action-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .empty {
            border: 1px dashed var(--line);
            border-radius: 12px;
            padding: 22px;
            text-align: center;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.02);
            font-size: 13px;
        }

        .result-meta {
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        @media (max-width: 980px) {
            .stats {
                grid-template-columns: repeat(2, minmax(140px, 1fr));
            }

            .filter-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="header">
            <div>
                <h1 class="title">P.A.T.H ADMIN DASHBOARD</h1>
                <p class="sub">점수/내신 검수, 사용자 상태 모니터링, 운영 현황 확인</p>
            </div>
            <div class="toolbar">
                <span class="sub" id="last-updated">마지막 동기화: -</span>
                <button class="btn" id="refresh-btn" type="button">새로고침</button>
                <label class="auto-refresh">
                    <input id="auto-refresh" type="checkbox" checked>
                    30초 자동 새로고침
                </label>
            </div>
        </header>

        <div id="notice" class="notice"></div>

        <section class="stats" id="stats">
            <div class="stat-card"><p class="stat-label">전체 유저</p><p class="stat-value" id="stat-users">-</p></div>
            <div class="stat-card"><p class="stat-label">검수 대기(총)</p><p class="stat-value" id="stat-pending-total">-</p></div>
            <div class="stat-card"><p class="stat-label">평가원 대기</p><p class="stat-value" id="stat-pending-score">-</p></div>
            <div class="stat-card"><p class="stat-label">내신 대기</p><p class="stat-value" id="stat-pending-gpa">-</p></div>
            <div class="stat-card"><p class="stat-label">관리자 계정</p><p class="stat-value" id="stat-admin">-</p></div>
        </section>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="pending" type="button">검수 대기</button>
            <button class="tab-btn" data-tab="users" type="button">사용자 관리</button>
        </nav>

        <section class="panel active" id="panel-pending">
            <div class="list" id="pending-list">
                <div class="empty">대기 데이터를 불러오는 중입니다.</div>
            </div>
        </section>

        <section class="panel" id="panel-users">
            <div class="filter-row">
                <input id="search-input" class="field" placeholder="닉네임, 실명, 대학 검색" type="text">
                <select id="score-filter" class="field">
                    <option value="all">평가원 상태 전체</option>
                    <option value="none">미제출</option>
                    <option value="pending">대기</option>
                    <option value="approved">승인</option>
                    <option value="rejected">반려</option>
                </select>
                <select id="gpa-filter" class="field">
                    <option value="all">내신 상태 전체</option>
                    <option value="none">미제출</option>
                    <option value="pending">대기</option>
                    <option value="approved">승인</option>
                    <option value="rejected">반려</option>
                </select>
                <label class="auto-refresh">
                    <input id="admin-only" type="checkbox">
                    관리자만 보기
                </label>
            </div>

            <p class="result-meta" id="users-result-meta"></p>
            <div class="list" id="user-list">
                <div class="empty">사용자 데이터를 불러오는 중입니다.</div>
            </div>
        </section>
    </div>

    <script>
        const state = {
            pending: [],
            users: [],
            loading: false,
            autoRefreshId: null,
            activeTab: 'pending'
        };

        function esc(value) {
            const div = document.createElement('div');
            div.textContent = value == null ? '' : String(value);
            return div.innerHTML;
        }

        function formatDate(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleString('ko-KR', { hour12: false });
        }

        function statusText(status) {
            return {
                none: '미제출',
                pending: '대기',
                approved: '승인',
                rejected: '반려'
            }[status || 'none'] || '미제출';
        }

        function setNotice(message, type) {
            const el = document.getElementById('notice');
            el.className = 'notice';
            if (!message) {
                el.textContent = '';
                return;
            }
            el.classList.add(type === 'error' ? 'error' : 'ok');
            el.textContent = message;
        }

        async function apiFetch(url, options) {
            const response = await fetch(url, {
                credentials: 'include',
                ...options
            });

            let payload = null;
            try {
                payload = await response.json();
            } catch (_) {
                payload = null;
            }

            if (!response.ok) {
                const error = new Error(payload?.error || '요청 처리 중 오류가 발생했습니다.');
                error.status = response.status;
                throw error;
            }

            return payload || {};
        }

        function updateStats() {
            const pendingScore = state.pending.filter((item) => item.score_status === 'pending').length;
            const pendingGpa = state.pending.filter((item) => item.gpa_status === 'pending').length;

            document.getElementById('stat-users').textContent = state.users.length;
            document.getElementById('stat-pending-total').textContent = pendingScore + pendingGpa;
            document.getElementById('stat-pending-score').textContent = pendingScore;
            document.getElementById('stat-pending-gpa').textContent = pendingGpa;
            document.getElementById('stat-admin').textContent = state.users.filter((u) => !!u.is_admin).length;
        }

        function renderPending() {
            const listEl = document.getElementById('pending-list');
            if (!state.pending.length) {
                listEl.innerHTML = '<div class="empty">현재 검수 대기 건이 없습니다.</div>';
                return;
            }

            listEl.innerHTML = state.pending.map((user) => {
                const userName = `${esc(user.real_name || '-') } (${esc(user.nickname || '-')})`;
                const commonMeta = `
                    <p class="meta">
                        <strong>대학:</strong> ${esc(user.university || '-')}<br>
                        ${user.is_n_su ? `<strong>N수:</strong> 예 (전적대 ${esc(user.prev_university || '-')})<br>` : ''}
                        <strong>가입일:</strong> ${formatDate(user.created_at)}
                    </p>
                `;

                const scoreBlock = user.score_status === 'pending' ? `
                    <div class="review-block" id="score-card-${user.id}">
                        <div class="review-title">
                            <span>평가원 점수 검수</span>
                            <span class="badge pending">대기</span>
                        </div>
                        <p class="meta"><strong>기존 점수:</strong> ${user.mock_exam_score || '미등록'}</p>
                        ${user.score_image_url ? `<img class="proof" src="${esc(user.score_image_url)}" alt="점수표" onclick="window.open('${esc(user.score_image_url)}', '_blank')">` : '<p class="meta">증빙 이미지가 없습니다.</p>'}
                        <div class="action-row">
                            <input class="field" style="max-width:140px" type="number" id="score-${user.id}" min="0" max="600" placeholder="점수 0~600">
                            <button class="btn primary" type="button" onclick="approveScore(${user.id}, this)">점수 승인</button>
                            <button class="btn danger" type="button" onclick="rejectScore(${user.id}, this)">점수 반려</button>
                        </div>
                    </div>
                ` : '';

                const gpaBlock = user.gpa_status === 'pending' ? `
                    <div class="review-block" id="gpa-card-${user.id}">
                        <div class="review-title">
                            <span>내신 등급 검수</span>
                            <span class="badge pending">대기</span>
                        </div>
                        <p class="meta"><strong>기존 내신:</strong> ${user.gpa_score || '미등록'}</p>
                        ${user.gpa_image_url ? `<img class="proof" src="${esc(user.gpa_image_url)}" alt="내신표" onclick="window.open('${esc(user.gpa_image_url)}', '_blank')">` : '<p class="meta">증빙 이미지가 없습니다.</p>'}
                        <div class="action-row">
                            <input class="field" style="max-width:140px" type="number" id="gpa-${user.id}" min="1" max="9" step="0.1" placeholder="내신 1.0~9.0">
                            <button class="btn primary" type="button" onclick="approveGpa(${user.id}, this)">내신 승인</button>
                            <button class="btn danger" type="button" onclick="rejectGpa(${user.id}, this)">내신 반려</button>
                        </div>
                    </div>
                ` : '';

                return `
                    <article class="card">
                        <div class="card-head">
                            <h3 class="name">${userName}</h3>
                            <span class="meta">ID: ${user.id}</span>
                        </div>
                        ${commonMeta}
                        ${scoreBlock}
                        ${gpaBlock}
                    </article>
                `;
            }).join('');
        }

        function getFilteredUsers() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            const scoreFilter = document.getElementById('score-filter').value;
            const gpaFilter = document.getElementById('gpa-filter').value;
            const adminOnly = document.getElementById('admin-only').checked;

            return state.users.filter((u) => {
                if (adminOnly && !u.is_admin) return false;
                if (scoreFilter !== 'all' && (u.score_status || 'none') !== scoreFilter) return false;
                if (gpaFilter !== 'all' && (u.gpa_status || 'none') !== gpaFilter) return false;

                if (!keyword) return true;
                const target = `${u.nickname || ''} ${u.real_name || ''} ${u.university || ''}`.toLowerCase();
                return target.includes(keyword);
            });
        }

        function renderUsers() {
            const listEl = document.getElementById('user-list');
            const filtered = getFilteredUsers();
            document.getElementById('users-result-meta').textContent = `검색 결과 ${filtered.length}명 / 전체 ${state.users.length}명`;

            if (!filtered.length) {
                listEl.innerHTML = '<div class="empty">조건에 맞는 사용자가 없습니다.</div>';
                return;
            }

            listEl.innerHTML = filtered.map((u) => {
                const scoreClass = u.score_status || 'none';
                const gpaClass = u.gpa_status || 'none';
                return `
                    <article class="card">
                        <div class="card-head">
                            <h3 class="name">${esc(u.real_name || '-')} (${esc(u.nickname || '-')})</h3>
                            <div>
                                <span class="badge ${scoreClass}">평가원 ${statusText(scoreClass)}</span>
                                <span class="badge ${gpaClass}">내신 ${statusText(gpaClass)}</span>
                            </div>
                        </div>
                        <p class="meta">
                            <strong>대학:</strong> ${esc(u.university || '-')}<br>
                            <strong>골드:</strong> ${(u.gold || 0).toLocaleString()} / <strong>티어:</strong> ${esc(u.tier || '-')}
                            / <strong>티켓:</strong> ${u.tickets || 0}<br>
                            <strong>평가원 점수:</strong> ${u.mock_exam_score || '-'} / <strong>내신:</strong> ${u.gpa_score ? `${u.gpa_score}등급` : '-'}
                            ${u.gpa_public ? ' (공개)' : ''}<br>
                            ${u.is_n_su ? `<strong>N수:</strong> 예 (전적대 ${esc(u.prev_university || '-')})<br>` : ''}
                            <strong>계정 권한:</strong> ${u.is_admin ? '관리자' : '일반 사용자'} / <strong>가입일:</strong> ${formatDate(u.created_at)}
                        </p>
                    </article>
                `;
            }).join('');
        }

        async function loadPending() {
            const data = await apiFetch('/api/admin/pending');
            state.pending = data.submissions || [];
            renderPending();
        }

        async function loadUsers() {
            const data = await apiFetch('/api/admin/all-users');
            state.users = data.users || [];
            renderUsers();
        }

        function setLastUpdated() {
            document.getElementById('last-updated').textContent = `마지막 동기화: ${new Date().toLocaleString('ko-KR', { hour12: false })}`;
        }

        async function refreshAll(showMessage) {
            if (state.loading) return;
            state.loading = true;
            setNotice('', 'ok');

            try {
                await Promise.all([loadPending(), loadUsers()]);
                updateStats();
                setLastUpdated();
                if (showMessage) setNotice('데이터를 최신 상태로 반영했습니다.', 'ok');
            } catch (error) {
                const pendingEl = document.getElementById('pending-list');
                const usersEl = document.getElementById('user-list');
                const blocked = error.status === 401 || error.status === 403;
                const guide = blocked
                    ? '관리자 권한이 필요합니다. 관리자 계정으로 로그인 후 다시 시도해주세요.'
                    : error.message;

                pendingEl.innerHTML = `<div class="empty">${esc(guide)}</div>`;
                usersEl.innerHTML = `<div class="empty">${esc(guide)}</div>`;
                document.getElementById('users-result-meta').textContent = '';
                setNotice(guide, 'error');
            } finally {
                state.loading = false;
            }
        }

        function withActionLock(button, task) {
            if (!button) return task();
            button.disabled = true;
            const original = button.textContent;
            button.textContent = '처리 중...';
            return task().finally(() => {
                button.disabled = false;
                button.textContent = original;
            });
        }

        async function approveScore(userId, button) {
            const scoreInput = document.getElementById(`score-${userId}`);
            const score = Number.parseInt(scoreInput?.value, 10);
            if (Number.isNaN(score) || score < 0 || score > 600) {
                alert('점수는 0~600 범위에서 입력해주세요.');
                return;
            }

            await withActionLock(button, async () => {
                await apiFetch('/api/admin/approve-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, score })
                });
                setNotice(`유저 ${userId} 평가원 점수 승인 완료`, 'ok');
                await refreshAll(false);
            }).catch((error) => {
                setNotice(error.message, 'error');
            });
        }

        async function rejectScore(userId, button) {
            if (!window.confirm('평가원 점수 제출을 반려하시겠습니까?')) return;
            await withActionLock(button, async () => {
                await apiFetch('/api/admin/reject-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                setNotice(`유저 ${userId} 평가원 점수 반려 완료`, 'ok');
                await refreshAll(false);
            }).catch((error) => {
                setNotice(error.message, 'error');
            });
        }

        async function approveGpa(userId, button) {
            const gpaInput = document.getElementById(`gpa-${userId}`);
            const gpa = Number.parseFloat(gpaInput?.value);
            if (Number.isNaN(gpa) || gpa < 1 || gpa > 9) {
                alert('내신은 1.0~9.0 범위에서 입력해주세요.');
                return;
            }

            await withActionLock(button, async () => {
                await apiFetch('/api/admin/approve-gpa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, gpa })
                });
                setNotice(`유저 ${userId} 내신 승인 완료`, 'ok');
                await refreshAll(false);
            }).catch((error) => {
                setNotice(error.message, 'error');
            });
        }

        async function rejectGpa(userId, button) {
            if (!window.confirm('내신 제출을 반려하시겠습니까?')) return;
            await withActionLock(button, async () => {
                await apiFetch('/api/admin/reject-gpa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                setNotice(`유저 ${userId} 내신 반려 완료`, 'ok');
                await refreshAll(false);
            }).catch((error) => {
                setNotice(error.message, 'error');
            });
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.querySelectorAll('.panel').forEach((panel) => {
                panel.classList.toggle('active', panel.id === `panel-${tab}`);
            });
        }

        function bindEvents() {
            document.querySelectorAll('.tab-btn').forEach((btn) => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            document.getElementById('refresh-btn').addEventListener('click', () => refreshAll(true));

            ['search-input', 'score-filter', 'gpa-filter', 'admin-only'].forEach((id) => {
                document.getElementById(id).addEventListener('input', renderUsers);
                document.getElementById(id).addEventListener('change', renderUsers);
            });

            document.getElementById('auto-refresh').addEventListener('change', (event) => {
                if (event.target.checked) {
                    state.autoRefreshId = setInterval(() => refreshAll(false), 30000);
                } else {
                    clearInterval(state.autoRefreshId);
                    state.autoRefreshId = null;
                }
            });
        }

        bindEvents();
        refreshAll(false);
        state.autoRefreshId = setInterval(() => refreshAll(false), 30000);
    </script>
</body>
</html>
