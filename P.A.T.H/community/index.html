<header class="c-header" id="app-header">

      <a href="/mainHub/" class="c-header__back" aria-label="메인으로">

            <path d="M23 11h-6"/><path d="M20 8v6"/>

    </div>
    <div class="c-header__right">
      <button class="c-header__icon-btn" id="theme-toggle" aria-label="라이트 모드 전환" aria-pressed="false" title="라이트 모드 전환">

          <path d="M4.93 4.93l1.41 1.41"></path><path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path><path d="M20 12h2"></path>
          <path d="M6.34 17.66l-1.41 1.41"></path><path d="M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg class="theme-icon theme-icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"></path>
        </svg>
      </button>
      <button class="c-header__icon-btn" id="search-toggle" aria-label="검색" aria-expanded="false">

</div>

<!-- ── 베스트 게시글 ────────────────────────────────────────── -->

  </div>

</section>

<!-- ── 게시글 목록 헤더 ──────────────────────────────────────── -->

  <div id="scroll-sentinel" aria-hidden="true"></div>

  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
    <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>

</button>
