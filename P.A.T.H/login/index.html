<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P.A.T.H - 로그인</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="P.A.T.H">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png">
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png">
    <meta name="msapplication-TileImage" content="/icons/icon-144.png">
    <meta name="msapplication-TileColor" content="#000000">
    <script src="/shared/nav.js?v=2"></script>
    <style>
        :root {
            --bg: #000000;
            --accent: #FF3B30;
            --gold: #D4AF37;
            --border: rgba(212, 175, 55, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid var(--border);
            padding: 40px 20px;
        }
        .logo { font-size: 3rem; font-weight: 100; letter-spacing: 20px; color: #fff; text-shadow: 0 0 30px rgba(212,175,55,0.3); margin-bottom: 8px; }
        .tagline { font-size: 11px; letter-spacing: 4px; color: #444; margin-bottom: 60px; text-transform: uppercase; }
        .card { width: 100%; max-width: 380px; }
        .tabs { display: flex; border-bottom: 1px solid #222; margin-bottom: 40px; }
        .tab { flex: 1; text-align: center; padding: 14px; font-size: 11px; letter-spacing: 3px; color: #444; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s; text-transform: uppercase; }
        .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
        .form { display: none; flex-direction: column; gap: 20px; }
        .form.active { display: flex; }
        .field { display: flex; flex-direction: column; gap: 8px; position: relative; }
        .univ-results {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #111; border: 1px solid #222; border-top: none;
            max-height: 200px; overflow-y: auto; z-index: 100;
            display: none;
        }
        .univ-results.show { display: block; }
        .univ-item {
            padding: 10px; font-size: 13px; color: #ccc; cursor: pointer;
            border-bottom: 1px solid #1a1a1a;
        }
        .univ-item:hover { background: #1a1a1a; color: var(--gold); }
        .univ-item:last-child { border-bottom: none; }
        label { font-size: 10px; letter-spacing: 3px; color: #555; text-transform: uppercase; }
        input[type="text"], input[type="password"], select {
            background: none; border: none; border-bottom: 1px solid #222;
            color: #fff; font-size: 1.1rem; padding: 10px 0; outline: none;
            transition: border-color 0.3s; font-family: inherit;
        }
        select {
            appearance: none;
            cursor: pointer;
        }
        select option {
            background: #111;
            color: #fff;
        }
        input:focus { border-bottom-color: var(--gold); }
        select:focus { border-bottom-color: var(--gold); }
        .check-row { display: flex; align-items: center; gap: 10px; }
        .check-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer; }
        .check-row label { font-size: 11px; letter-spacing: 1px; cursor: pointer; color: #888; }
        .check-row a { color: var(--gold); text-decoration: underline; font-size: 10px; }
        .nsu-fields { display: none; }
        .nsu-fields.show { display: flex; flex-direction: column; gap: 20px; }
        .btn-submit {
            margin-top: 16px; background: none; border: 1px solid #444;
            color: #888; padding: 18px; font-size: 11px; letter-spacing: 5px;
            cursor: pointer; text-transform: uppercase; transition: all 0.4s;
            font-family: inherit; width: 100%;
        }
        .btn-submit:hover { border-color: #fff; color: #fff; }
        .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; }
        .error-msg { font-size: 11px; color: var(--accent); letter-spacing: 1px; text-align: center; min-height: 16px; }
        .privacy-box {
            max-height: 150px; overflow-y: auto; padding: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid #222;
            border-radius: 4px; font-size: 10px; color: #666;
            line-height: 1.6; letter-spacing: 0.5px; display: none;
        }
        .privacy-box.show { display: block; }

        .theme-toggle-btn {
            position: fixed; top: 16px; right: 16px;
            background: none; border: 1px solid #333;
            color: #888; padding: 7px 12px; font-size: 16px;
            cursor: pointer; border-radius: 4px; transition: 0.3s;
            z-index: 999; line-height: 1;
        }
        .theme-toggle-btn:hover { border-color: #888; color: #ccc; }

        body.light {
            background: #edf4fb;
            color: #1a1f2e;
            border-color: rgba(0,0,0,0.10);
        }
        body.light .logo { color: #1a1f2e; text-shadow: 0 0 30px rgba(212,175,55,0.18); }
        body.light .tagline { color: #8090a8; }
        body.light .tabs { border-bottom-color: #d0d8e4; }
        body.light .tab { color: #a0a8b8; }
        body.light .tab.active { color: var(--gold); }
        body.light label { color: #8090a8; }
        body.light input[type="text"], body.light input[type="password"], body.light select {
            color: #1a1f2e;
            border-bottom-color: #b8c4d0;
        }
        body.light select option {
            background: #fff;
            color: #1a1f2e;
        }
        body.light .btn-submit { border-color: #b8c4d0; color: #7a8898; }
        body.light .btn-submit:hover { border-color: #1a1f2e; color: #1a1f2e; }
        body.light .univ-results { background: #fff; border-color: #d0d8e4; }
        body.light .univ-item { color: #444; border-bottom-color: #eef2f8; background: #fff; }
        body.light .univ-item:hover { background: #f0f6fc; color: var(--gold); }
        body.light .check-row label { color: #8090a8; }
        body.light .privacy-box { background: rgba(0,0,0,0.03); border-color: #d0d8e4; color: #8090a8; }
        body.light .theme-toggle-btn { border-color: #c0c8d8; color: #8090a8; }
        body.light .theme-toggle-btn:hover { border-color: #1a1f2e; color: #1a1f2e; }

        .oauth-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 12px 0; color: #555; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
        .oauth-divider::before, .oauth-divider::after { content: ''; flex: 1; height: 1px; background: #222; }
        body.light .oauth-divider::before, body.light .oauth-divider::after { background: #d0d8e4; }
        body.light .oauth-divider { color: #8090a8; }

        .btn-oauth { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: none; border: 1px solid #333; color: #999; 
            padding: 16px; font-size: 11px; letter-spacing: 3px;
            cursor: pointer; text-transform: uppercase; transition: all 0.3s;
            font-family: inherit; width: 100%; border-radius: 4px;
            text-decoration: none;
        }
        .btn-oauth:hover { border-color: #ddd; color: #ddd; background: rgba(255,255,255,0.03); }
        .btn-oauth svg { width: 16px; height: 16px; }
        
        body.light .btn-oauth { border-color: #b8c4d0; color: #7a8898; }
        body.light .btn-oauth:hover { border-color: #1a1f2e; color: #1a1f2e; background: rgba(0,0,0,0.03); }
        
        .oauth-section { margin-bottom: 32px; }
        .or-separator { display: flex; align-items: center; gap: 12px; margin: 32px 0 20px 0; color: #555; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
        .or-separator::before, .or-separator::after { content: ''; flex: 1; height: 1px; background: #222; }
        body.light .or-separator::before, body.light .or-separator::after { background: #d0d8e4; }
        body.light .or-separator { color: #8090a8; }

        /* Improve tap-to-click reliability on mobile WebView/Safari. */
        button, .tab, a.btn-oauth, .check-row a, input[type="checkbox"], select {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
<script>
(function(){
    const th = localStorage.getItem('path_theme') || 'dark';
    if (th === 'light') document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded', function(){
        const btn = document.getElementById('theme-btn');
        if (btn) btn.textContent = (th === 'light') ? '🌙' : '☀️';
    });
})();
function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('path_theme', isLight ? 'light' : 'dark');
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = isLight ? '🌙' : '☀️';
}
</script>
<button id="theme-btn" class="theme-toggle-btn">☀️</button>
    <div class="logo">P.A.T.H</div>
    <div class="tagline">수험생을 위한 극한의 공부 경쟁</div>

    <div class="card">
        <div class="tabs">
            <div class="tab active" id="tab-login">LOGIN</div>
            <div class="tab" id="tab-register">REGISTER</div>
        </div>

        <form class="form active" id="form-login">
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="login-nick" placeholder="닉네임 입력" autocomplete="username">
            </div>
            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password">
            </div>
            <div class="error-msg" id="login-err"></div>
            <button type="submit" class="btn-submit">ENTER PATH</button>
            
            <div class="or-separator">또는</div>
            <a href="/api/auth/google" class="btn-oauth">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"/>
                </svg>
                GOOGLE로 계속하기
            </a>
        </form>

        <form class="form" id="form-register">
            <div class="field">
                <label>실명</label>
                <input type="text" id="reg-name" placeholder="실명 입력" autocomplete="name">
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="reg-nick" placeholder="2~20자" autocomplete="username">
            </div>
            <div class="field">
                <label>목표 대학교</label>
                <select id="reg-univ" required>
                    <option value="">대학교를 선택하세요</option>
                </select>
            </div>
            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="reg-pw" placeholder="4자 이상" autocomplete="new-password">
            </div>

            <div class="check-row">
                <input type="checkbox" id="reg-nsu">
                <label for="reg-nsu">N수생입니다</label>
            </div>

            <div class="nsu-fields" id="nsu-fields">
                <div class="field">
                    <label>전적 대학교 (재학/졸업)</label>
                    <select id="reg-prev-univ">
                        <option value="">전적 대학교를 선택하세요</option>
                    </select>
                </div>
            </div>

            <div class="check-row">
                <input type="checkbox" id="reg-privacy">
                <label for="reg-privacy">개인정보 수집·이용 동의</label>
                <a href="#" id="privacy-toggle">보기</a>
            </div>

            <div class="privacy-box" id="privacy-box">
                <strong>[개인정보 수집·이용 동의]</strong><br><br>
                1. 수집 항목: 실명, 닉네임, 대학교, 비밀번호(암호화), 성적 이미지<br>
                2. 수집 목적: 서비스 제공, 본인 확인, 성적 인증, 랭킹 시스템 운영<br>
                3. 보유 기간: 회원 탈퇴 시 즉시 파기<br>
                4. 동의 거부 시 서비스 이용이 제한됩니다.<br><br>
                P.A.T.H는 수집된 개인정보를 제3자에게 제공하지 않으며,<br>
                관련 법령에 따라 안전하게 관리합니다.
            </div>

            <div class="error-msg" id="reg-err"></div>
            <button type="submit" class="btn-submit" id="reg-submit" disabled>JOIN THE PATH</button>
            
            <div class="or-separator">또는</div>
            <a href="/api/auth/google" class="btn-oauth">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"/>
                </svg>
                GOOGLE로 계속하기
            </a>
        </form>
    </div>

    <script>
        (async () => {
            try {
                const r = await fetch('/api/auth/me', { credentials: 'include' });
                if (r.ok) navigateTo('/mainHub/');
            } catch (e) {}
        })();

        function switchTab(tab) {
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('form-login').classList.toggle('active', tab === 'login');
            document.getElementById('form-register').classList.toggle('active', tab === 'register');
        }

        function toggleNsu() {
            const checked = document.getElementById('reg-nsu').checked;
            document.getElementById('nsu-fields').classList.toggle('show', checked);
            if (!checked) {
                document.getElementById('reg-prev-univ').value = '';
            }
        }

        function togglePrivacy(e) {
            e.preventDefault();
            document.getElementById('privacy-box').classList.toggle('show');
        }

        function checkSubmit() {
            document.getElementById('reg-submit').disabled = !document.getElementById('reg-privacy').checked;
        }

        async function loadUniversityOptions() {
            const targetSelect = document.getElementById('reg-univ');
            const prevSelect = document.getElementById('reg-prev-univ');

            try {
                const r = await fetch('/api/university/list');
                const data = await r.json();
                const list = data.universities || [];

                for (const u of list) {
                    const label = `${u.name} (${u.region})`;

                    const targetOption = document.createElement('option');
                    targetOption.value = u.name;
                    targetOption.textContent = label;
                    targetSelect.appendChild(targetOption);

                    const prevOption = document.createElement('option');
                    prevOption.value = u.name;
                    prevOption.textContent = label;
                    prevSelect.appendChild(prevOption);
                }
            } catch (e) {
                console.error('university list load error', e);
            }
        }

        loadUniversityOptions();

        function bindTap(el, handler) {
            if (!el) return;
            let lastTapTs = 0;
            el.addEventListener('click', handler);
            el.addEventListener('pointerup', function (e) {
                if (e.pointerType !== 'touch') return;
                const now = Date.now();
                if (now - lastTapTs < 250) return;
                lastTapTs = now;
                e.preventDefault();
                handler(e);
            }, { passive: false });
        }

        function initBindings() {
            bindTap(document.getElementById('theme-btn'), toggleTheme);
            bindTap(document.getElementById('tab-login'), function () { switchTab('login'); });
            bindTap(document.getElementById('tab-register'), function () { switchTab('register'); });

            // In native app (Capacitor), mark OAuth requests so server uses app-safe redirects.
            if (isNativeApp()) {
                document.querySelectorAll('a.btn-oauth').forEach(function (link) {
                    link.href = '/api/auth/google?platform=app';
                });
            }

            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            if (loginForm) loginForm.addEventListener('submit', doLogin);
            if (registerForm) registerForm.addEventListener('submit', doRegister);

            const nsuCheckbox = document.getElementById('reg-nsu');
            const privacyCheckbox = document.getElementById('reg-privacy');
            if (nsuCheckbox) nsuCheckbox.addEventListener('change', toggleNsu);
            if (privacyCheckbox) privacyCheckbox.addEventListener('change', checkSubmit);

            const privacyToggle = document.getElementById('privacy-toggle');
            if (privacyToggle) privacyToggle.addEventListener('click', togglePrivacy);

            // Fallback for WebViews where touch does not dispatch click on anchors.
            document.querySelectorAll('a.btn-oauth').forEach(function (link) {
                link.addEventListener('pointerup', function (e) {
                    if (e.pointerType !== 'touch') return;
                    e.preventDefault();
                    window.location.href = link.href;
                }, { passive: false });
            });
        }

        function isNativeApp() {
            const cap = window.Capacitor;
            if (!cap) return false;

            try {
                if (typeof cap.isNativePlatform === 'function') return !!cap.isNativePlatform();
                if (typeof cap.getPlatform === 'function') {
                    const platform = cap.getPlatform();
                    return platform === 'ios' || platform === 'android';
                }
            } catch (_) {}

            return false;
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initBindings, { once: true });
        } else {
            initBindings();
        }

        async function doLogin(e) {
            e.preventDefault();
            const errEl = document.getElementById('login-err');
            errEl.textContent = '';
            const nickname = document.getElementById('login-nick').value.trim();
            const password = document.getElementById('login-pw').value;
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ nickname, password })
                });
                const data = await r.json();
                if (!r.ok) { errEl.textContent = data.error; return; }
                localStorage.setItem('path_onboarding_pending', 'true');
                navigateTo('/mainHub/');
            } catch (err) { errEl.textContent = '서버 연결 오류'; }
        }

        async function doRegister(e) {
            e.preventDefault();
            const errEl = document.getElementById('reg-err');
            errEl.textContent = '';
            const real_name   = document.getElementById('reg-name').value.trim();
            const nickname    = document.getElementById('reg-nick').value.trim();
            const university  = document.getElementById('reg-univ').value.trim();
            const password    = document.getElementById('reg-pw').value;
            const is_n_su     = document.getElementById('reg-nsu').checked;
            const prev_university = is_n_su ? document.getElementById('reg-prev-univ').value.trim() : '';
            const privacy_agreed  = document.getElementById('reg-privacy').checked;

            if (!real_name) { errEl.textContent = '실명을 입력해주세요.'; return; }
            if (!privacy_agreed) { errEl.textContent = '개인정보 수집·이용에 동의해주세요.'; return; }

            try {
                const r = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ real_name, nickname, university, password, is_n_su, prev_university, privacy_agreed })
                });
                const data = await r.json();
                if (!r.ok) { errEl.textContent = data.error; return; }
                navigateTo('/mainHub/');
            } catch (err) { errEl.textContent = '서버 연결 오류'; }
        }

        // Keep handlers reachable from global scope across WebView/browser differences.
        window.toggleTheme = toggleTheme;
        window.switchTab = switchTab;
        window.toggleNsu = toggleNsu;
        window.togglePrivacy = togglePrivacy;
        window.checkSubmit = checkSubmit;
        window.doLogin = doLogin;
        window.doRegister = doRegister;
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
        }
    </script>
</body>
</html>
