<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P.A.T.H - Focus Protocol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="path-interface">
    
    <!-- Top Status Line -->
    <header class="status-bar">
        <div class="status-left">
            <span class="status-label">OPERATOR</span>
            <span class="status-val tier-text">CHALLENGER</span>
            <span class="status-val sub" id="rank-pct">0.08%</span>
        </div>
        <div class="status-right">
            <span class="resource">🪙 <span id="gold-val">14,500</span></span>
            <span class="resource">🎟️ <span id="ticket-val">01</span></span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="focus-container">
        <div class="mode-group" id="mode-group">
            <button id="mode-timer" class="mode-btn active" type="button">TIMER</button>
            <button id="mode-stopwatch" class="mode-btn" type="button">STOPWATCH</button>
        </div>
        
        <!-- Timer Setup (Visible initially) -->
        <div id="setup-area" class="setup-group">
            <div class="input-unit">
                <input type="number" id="input-hr" class="time-input" value="01" placeholder="00">
                <span class="unit-label">HRS</span>
            </div>
            <div class="input-sep">:</div>
            <div class="input-unit">
                <input type="number" id="input-min" class="time-input" value="40" placeholder="40">
                <span class="unit-label">MIN</span>
            </div>
        </div>

        <!-- Active Timer Display -->
        <div id="main-timer" class="timer-display">
            <span id="display-time">00:00</span><span id="ms" class="timer-ms">.00</span>
        </div>

        <!-- Controls -->
        <div class="control-group">
            <button id="enter-btn" class="btn-primary cmd-btn">INITIALIZE PATH</button>
            <button id="break-btn" class="btn-danger cmd-btn hidden">ABORT PATH</button>
        </div>

    </main>

    <!-- Bottom Info -->
    <footer class="footer-info">
        <span class="system-msg">DOMAIN: YONSEI UNIV. BIZ</span>
    </footer>

    <!-- Result Overlay -->
    <div id="overlay" class="result-overlay hidden">
        <div class="result-card">
            <h1 id="res-title" class="result-header">MISSION COMPLETE</h1>
            <div id="res-loot" class="result-details"></div>
            <button id="reset-btn" class="btn-primary cmd-btn">RETURN TO BASE</button>
        </div>
    </div>

    <script src="wakelock.js"></script>
    <script src="storage.js"></script> 
    <script src="core.js"></script>
    <script src="ui.js"></script>
</body>
</html>
