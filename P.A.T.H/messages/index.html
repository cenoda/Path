<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C1222" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#EEF4FF" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>메시지 - P.A.T.H</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MaruBuri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/suitcss@1.0.0/SUIT-Variable.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://cdn.jsdelivr.net/npm/suitcss@1.0.0/SUIT-Variable.css" rel="stylesheet"></noscript>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="/shared/redesign.css?v=2">
  <link rel="stylesheet" href="style.css?v=20260315">
  <script src="/shared/theme.js?v=1"></script>
</head>
<body class="messages-page" data-view="list">
<script>
(function () {
  var prefersLight = !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
  var fallback = prefersLight ? 'light' : 'dark';

  if (window.PathTheme && typeof window.PathTheme.applyStoredTheme === 'function') {
    window.PathTheme.applyStoredTheme({ fallback: fallback });
    return;
  }

  var mode = localStorage.getItem('path_theme') || fallback;
  document.body.classList.toggle('light', mode === 'light');
})();
</script>

<header class="c-header msg-shell-header" id="app-header">
  <div class="c-header__inner">
    <div class="c-header__left">
      <button class="c-header__back" aria-label="뒤로가기" id="btn-header-back" type="button">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M12.5 4.5L6.8 10L12.5 15.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>

      <div class="c-header__brand">
        <span class="c-header__logo msg-header__logo" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M7 10.5C7 7.46243 9.46243 5 12.5 5H16C18.2091 5 20 6.79086 20 9V10.5C20 12.7091 18.2091 14.5 16 14.5H14.2L10.5 18V14.5H12.5C9.46243 14.5 7 12.0376 7 9V10.5Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M9 9.5H15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
            <path d="M9 12H13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
          </svg>
        </span>
        <span class="c-header__title">메시지</span>
      </div>
    </div>

    <div class="c-header__right">
      <span id="list-count-label" class="c-header__badge msg-header-badge">0 대화</span>
      <span id="list-unread-total" class="c-header__badge msg-header-badge msg-header-badge--accent">미확인 0</span>
      <button class="c-header__icon-btn" id="theme-toggle" aria-label="라이트 모드 전환" aria-pressed="false" title="라이트 모드 전환" type="button">
        <svg class="theme-icon theme-icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path><path d="M12 20v2"></path>
          <path d="M4.93 4.93l1.41 1.41"></path><path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path><path d="M20 12h2"></path>
          <path d="M6.34 17.66l-1.41 1.41"></path><path d="M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <svg class="theme-icon theme-icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"></path>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="msg-main">
  <section id="view-list" class="msg-pane msg-pane-list">
    <div class="msg-list-head">
      <p class="msg-list-title">대화 목록</p>
      <p class="msg-list-sub">동맹 및 그룹 채팅을 한곳에서 관리</p>
    </div>

    <div class="conv-search-wrap">
      <span class="conv-search-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input id="conv-search" class="conv-search-input" type="text" placeholder="닉네임, 메시지, 그룹명 검색" maxlength="60" autocomplete="off">
    </div>

    <div id="conv-search-history" class="conv-search-history hidden"></div>

    <div id="conv-items" class="conv-items" aria-live="polite">
      <div class="conv-empty">대화 목록을 불러오는 중...</div>
    </div>
  </section>

  <section id="view-chat" class="msg-pane msg-pane-chat hidden" aria-live="polite">
    <header class="msg-header msg-header--mainpage" id="msg-header">
      <div class="msg-header__center" id="header-center" onclick="onHeaderCenterClick()">
        <div class="msg-header__avatar" id="header-avatar">
          <span id="header-avatar-text">💬</span>
          <img id="header-avatar-img" class="hidden" alt="">
          <span id="header-online" class="header-online hidden"></span>
        </div>
        <div class="msg-header__meta">
          <div class="msg-header__eyebrow">PATH SOCIAL</div>
          <div class="msg-header__title" id="header-title">메시지</div>
          <div class="msg-header__sub" id="header-sub">대화를 선택해 주세요</div>
        </div>
      </div>

      <div class="msg-header__right">
        <span class="msg-header__badge hidden" id="msg-badge"></span>
      </div>
    </header>

    <div id="chat-messages" class="chat-messages">
      <div class="chat-placeholder">
        <div class="chat-placeholder__badge">PATH CHAT</div>
        <h2>대화를 선택해 주세요</h2>
        <p>왼쪽 목록에서 상대를 선택하면 새 채팅 화면이 열립니다.</p>
      </div>
    </div>

    <div id="chat-delivery-status" class="chat-delivery-status" style="display:none;"></div>

    <div id="file-preview" class="file-preview hidden">
      <span id="file-preview-name"></span>
      <button onclick="cancelFileUpload()" class="file-preview-cancel" type="button">취소</button>
    </div>

    <div class="chat-input-row">
      <input type="file" id="chat-file-input" class="hidden" accept="image/*,.pdf,.txt" onchange="handleFileSelect(event)">
      <button class="chat-file-btn" id="btn-file-attach" onclick="document.getElementById('chat-file-input').click()" title="파일 첨부" type="button" aria-label="파일 첨부">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-8.49 8.49a6 6 0 01-8.49-8.49l9.2-9.19a4 4 0 115.66 5.66l-9.2 9.2a2 2 0 11-2.83-2.83l8.49-8.48"></path>
        </svg>
      </button>

      <textarea id="chat-input" class="chat-input" rows="1" placeholder="메시지를 입력하세요" maxlength="500"></textarea>

      <button class="chat-send-btn" onclick="sendMessage()" aria-label="전송" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </section>
</main>

<script>
(function () {
  var backBtn = document.getElementById('btn-header-back');
  if (!backBtn) return;

  function goStudyHub() {
    if (typeof window.navigateTo === 'function') {
      window.navigateTo('/study-hub/');
      return;
    }
    window.location.href = '/study-hub/';
  }

  function goToListView() {
    var listPane = document.getElementById('view-list');
    var chatPane = document.getElementById('view-chat');
    document.body.setAttribute('data-view', 'list');
    if (listPane) listPane.classList.remove('hidden');
    if (chatPane) chatPane.classList.add('hidden');
  }

  function isChatViewActive() {
    if (document.body.getAttribute('data-view') === 'chat') return true;
    var chatPane = document.getElementById('view-chat');
    return !!(chatPane && !chatPane.classList.contains('hidden'));
  }

  function handleBackInternal() {
    if (isChatViewActive()) {
      goToListView();
      return;
    }

    if (window.history.length > 1) {
      window.history.back();
      window.setTimeout(function () {
        if (document.visibilityState === 'visible') goStudyHub();
      }, 280);
      return;
    }

    goStudyHub();
  }

  window.handleBack = handleBackInternal;

  var touchTs = 0;
  backBtn.addEventListener('pointerup', function (event) {
    if (event.pointerType !== 'touch') return;
    var now = Date.now();
    if (now - touchTs < 250) return;
    touchTs = now;
    event.preventDefault();
    event.stopPropagation();
    handleBackInternal();
  }, { passive: false });

  backBtn.addEventListener('click', function (event) {
    var now = Date.now();
    if (now - touchTs < 350) {
      event.preventDefault();
      event.stopPropagation();
      return;
    }
    event.preventDefault();
    handleBackInternal();
  });
})();
</script>

<script src="/shared/nav.js?v=5"></script>
<script src="messages.js?v=20260318"></script>
</body>
</html>
